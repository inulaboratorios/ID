<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inu ID · Laboratorio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/app.css">
<link rel="stylesheet" href="/css/lab.css">
</head>
<body>
<div class="shell">

  <template id="brand-tpl">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 4l5 4v6c0 3-2.4 4-5 4s-5-1-5-4V8l5-4z" stroke="#0E7490" stroke-width="1.7" stroke-linejoin="round"/><circle cx="12" cy="13" r="2" fill="#2FAEC9"/></svg>
  </template>

  <!-- ============ LOGIN ADMIN ============ -->
  <section id="lab-login" class="auth hidden">
    <div class="brand"><span data-brandicon></span><b>Inu<span> ID</span></b></div>
    <div class="card auth-card">
      <div class="lab-badge">Laboratorio</div>
      <h1>Acceso interno</h1>
      <p class="sub">Solo para cuentas de laboratorio</p>
      <div class="field">
        <label for="lab-user">Usuario</label>
        <input id="lab-user" type="text" autocomplete="username" placeholder="Usuario admin">
      </div>
      <div class="field">
        <label for="lab-pass">Contraseña</label>
        <input id="lab-pass" type="password" autocomplete="current-password" placeholder="Contraseña">
      </div>
      <div class="err" id="lab-err"></div>
      <button class="btn btn-primary" id="lab-login-btn">Ingresar</button>
    </div>
  </section>

  <!-- ============ PANEL ============ -->
  <section id="lab-app" class="hidden">
    <div class="topbar">
      <div class="brand"><span data-brandicon></span><b>Inu<span> ID</span></b><span class="lab-tag">Lab</span></div>
      <button class="logout" id="lab-logout">Salir</button>
    </div>

    <div class="segment">
      <button class="seg-btn active" data-tab="con">Con collar</button>
      <button class="seg-btn" data-tab="sin">Sin collar</button>
    </div>

    <div class="search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input id="lab-search" type="text" placeholder="Buscar por nombre…">
    </div>

    <div id="lab-list"></div>
  </section>

  <!-- ============ ASIGNAR COLLAR ============ -->
  <section id="lab-assign" class="hidden">
    <div class="viewhead">
      <button class="back" id="assign-back"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
      <h2>Asignar collar</h2>
    </div>

    <div class="card assign-pet">
      <div class="ava" id="assign-emoji">🐶</div>
      <div>
        <div class="nm" id="assign-name"></div>
        <div class="meta" id="assign-owner"></div>
      </div>
    </div>

    <div class="card assign-block">
      <div class="lab-lab">URL del perfil</div>
      <p class="assign-hint">Copia esta dirección y grábala en el collar NFC con NFC Tools.</p>
      <div class="copyrow">
        <input id="assign-url" type="text" readonly>
        <button class="copybtn" id="assign-copy">Copiar</button>
      </div>
    </div>

    <div class="card assign-block">
      <div class="lab-lab">Cuando termines de grabar el collar</div>
      <p class="assign-hint">Marca este perfil como conectado. Pasará a la lista de “Con collar”.</p>
      <button class="btn btn-primary" id="assign-done">Collar asignado</button>
    </div>
  </section>

</div>
<div id="toast"></div>

<script src="/js/config.js"></script>
<script src="/js/store.js"></script>
<script src="/js/lab.js"></script>
</body>
</html>
